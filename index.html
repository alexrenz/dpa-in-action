<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting…</title>

  <!-- Immediate redirect -->
  <meta http-equiv="refresh" content="0; url=https://dpa-in-action.alexrw.org/">

  <!-- Helps search engines understand this is a redirect -->
  <link rel="canonical" href="https://dpa-in-action.alexrw.org/">

  <script>
    // JavaScript fallback
    window.location.replace("https://dpa-in-action.alexrw.org/");
  </script>
</head>
<body>
  <p>
    Redirecting to
    <a href="https://dpa-in-action.alexrw.org/">https://dpa-in-action.alexrw.org/</a>.
  </p>
</body>
</html>
